        const firebaseConfig = { apiKey: "AIzaSyDIhprsI0959enUNvqHRn6jqdACHGQE7Oo", authDomain: "sapient-hub-485206-a1.firebaseapp.com", databaseURL: "https://sapient-hub-485206-a1-default-rtdb.firebaseio.com", projectId: "sapient-hub-485206-a1", storageBucket: "sapient-hub-485206-a1.firebasestorage.app", appId: "1:1016880074231:web:135881dd3ef1989f7472f2" };

        function triggerError(t, d) { playZeldaSound('error'); const e = document.getElementById('errorOverlay'); e.innerHTML = `<div class="error-box"><div class="text-6xl animate-bounce">⚠️</div><h3 class="text-3xl text-red-500 font-black tracking-widest">${t}</h3><p class="text-red-300 text-lg">${d}</p><button onclick="document.getElementById('errorOverlay').style.display='none'" class="mt-8 px-12 py-3 bg-red-700 hover:bg-red-600 text-white rounded-full font-bold">确认</button></div>`; e.style.display = 'flex'; }
        
        let imageSlots = new Array(12).fill(null);

        function authenticateTerminal() { if (document.getElementById('terminalPwd').value === "3123119") { localStorage.setItem('hyrule_auth', 'G'); document.getElementById('authOverlay').style.display = 'none'; fillUrls(); loadAppState(); playZeldaSound('victory'); } else { triggerError('FAIL', '验证失败'); } }
        function switchView(v, e) { playZeldaSound('click'); document.querySelectorAll('.dashboard-view, #view-adventure-log').forEach(x => x.classList.add('hidden')); document.getElementById(`view-${v}`).classList.remove('hidden'); document.querySelectorAll('.category-icon').forEach(x => x.classList.remove('active')); e.classList.add('active'); }

        function loadAppState() { 
            // 🔴 修复乱码显示：检测并删除旧版 incompatible state 🔴
            if(localStorage.getItem('hyrule_state_v13')) localStorage.removeItem('hyrule_state_v13');

            try { const s = JSON.parse(str); document.getElementById('designScope').value = s.scope || ''; document.getElementById('targetMarket').value = s.market || ''; document.getElementById('prodName').value = s.name || ''; document.getElementById('prodDesc').value = s.desc || ''; document.getElementById('sopText').value = s.sop || ''; imageSlots = s.images || new Array(12).fill(null); if (s.sop) document.getElementById('mainBtn').disabled = false; buildGalleryLayout(); imageSlots.forEach((img, i) => { if (img) renderSlot(i); }); } catch (e) {}
        }
        function handleScopeChange() { playZeldaSound('click'); imageSlots.fill(null); buildGalleryLayout(); saveAppState(); }
        function toggleReveal(id, e) { playZeldaSound('click'); const i = document.getElementById(id); if (i.type === 'password') { i.type = 'text'; e.style.opacity = '1'; } else { i.type = 'password'; e.style.opacity = '0.5'; } }

        function renderSlot(idx) {
            const slot = document.getElementById(`slot-${idx}`); if(!slot) return; slot.classList.remove('standby'); const data = imageSlots[idx];
            const displayUrl = data.history ? data.history[data.currentIndex] : data.url;
            slot.innerHTML = `<img src="${displayUrl}" crossorigin="anonymous"><div class="slot-actions" style="flex-direction: column; gap: 8px; padding: 10px;"><div class="flex items-center justify-between gap-2 w-full"><button onclick="triggerGeneration(${idx})" class="flex-1 text-[10px] border border-sheikah-blue py-1 rounded">REDRAW</button><button onclick="openEditModal(${idx})" class="flex-1 text-[10px] border border-sheikah-blue py-1 rounded">EDIT</button></div></div>`;
        }

        function resumeKieListener(slotIdx, taskId) {
            const slot = document.getElementById(`slot-${slotIdx}`); slot.classList.add('standby'); slot.innerHTML = `<div class="animate-pulse py-16 text-sheikah-blue">SYNCING</div>`;
            const ref = db.ref('hyrule_tasks/' + taskId);
            ref.on('value', (sn) => {
                const d = sn.val(); if (!d) return;
                if (d.status === 'completed') {
                    imageSlots[slotIdx] = { url: d.imageUrl }; activeKieTasks = activeKieTasks.filter(t => t.slot !== slotIdx); saveAppState(); renderSlot(slotIdx); ref.off();
                    // 🔴 新增自动侦测逻辑：全完了就截图 🔴
                    if (activeKieTasks.length === 0) { setTimeout(() => { autoCaptureAndSyncToFeishu(); }, 2000); }
                }
            });
        }

        async function triggerGeneration(targetIdx = null) {
            const url = document.getElementById('webhookUrl').value; const sop = document.getElementById('sopText').value; const scope = document.getElementById('designScope').value;
            if (!scope) { triggerError('MISSING', '请选择范围'); return; }
            if (!url || !sop) { triggerError('ERROR', 'KIE 节点未就绪'); return; }
            playZeldaSound('click'); switchView('adventure-log', document.getElementById('nav-notes'));
            document.getElementById('logContent').innerText = "究极手调和中..."; const batchId = Date.now();
            if(targetIdx === null) imageSlots.fill(null);
            buildGalleryLayout(); // Reset view
            const payload = { sop_text: sop, firebase_tasks: [] };
            for(let i=0; i<12; i++) { if(document.getElementById(`slot-${i}`)) { const tid = `task_${batchId}_${i}`; if(targetIdx === null || targetIdx === i) { payload.firebase_tasks.push({ slot: i, taskId: tid }); activeKieTasks.push({ slot: i, taskId: tid }); resumeKieListener(i, tid); } } }
            saveAppState();
            try { await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }); } catch (e) { triggerError('NET ERR', '连接 KIE 节点失败'); }
        }

        // 🔴 新增：自动归档奥义 🔴
        async function autoCaptureAndSyncToFeishu() {
            const logEl = document.getElementById('logContent'); const prodName = document.getElementById('prodName').value || "未命名";
            try {
                const canvas = await html2canvas(document.querySelector('.purah-pad'), { useCORS: true, allowTaint: true, scale: 1.5, backgroundColor: '#1A1614' });
                canvas.toBlob(async (blob) => {
                    logEl.innerText = "归档中..."; const rId = `report_${Date.now()}`;
                    const ref = firebase.storage().ref().child(`hyrule_reports/${rId}.jpg`);
                    await ref.put(blob); const reportUrl = await ref.getDownloadURL();
                    const p = { product_name: prodName, report_url: reportUrl, timestamp: new Date().toISOString() };
                    await fetch(N8N_FEISHU_REPORT_WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(p) });
                    logEl.innerHTML = "<span class='text-zonai-teal'>✅ 战报已自动成功归档至飞书！</span>";
                }, 'image/jpeg', 0.8);
            } catch (e) { logEl.innerHTML = "<span class='text-red-500'>❌ 归档失败，请检查 Firebase 规则。</span>"; }
        }
